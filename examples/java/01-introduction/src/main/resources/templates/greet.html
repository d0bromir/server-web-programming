<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Поздрав</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width:600px">
    <h1 class="mb-3">Персонален поздрав</h1>
    <p class="text-muted">Тема 01 – <code>@RequestParam</code></p>

    <div class="alert alert-success fs-5" th:text="${message}">Здравей!</div>

    <!-- Форма с GET – параметърът се изпраща в URL (query string) -->
    <form method="get" action="/greet" class="mb-3">
        <div class="input-group">
            <input type="text" name="name" class="form-control"
                   placeholder="Въведи своето иmе" th:value="${name}">
            <button type="submit" class="btn btn-primary">Поздрави</button>
        </div>
        <div class="form-text">
            Параметърът се изпраща в URL: <code>/greet?name=...</code>
        </div>
    </form>

    <div class="alert alert-info small">
        <strong>Анотация:</strong> <code>@RequestParam(defaultValue = "Студент") String name</code><br>
        Spring автоматично чете стойността на <code>?name=...</code> от URL.
    </div>

    <a href="/" class="btn btn-secondary">← Начало</a>
</div>
</body>
</html>
