<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>Тема 07 – CRUD (Thymeleaf + JPA)</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; }
    h1   { font-size: 1.4rem; }
    ul   { line-height: 2; }
    code { background: #f4f4f4; padding: 0.1em 0.4em; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Тема 07 – CRUD (Thymeleaf + JPA)</h1>
  <ul>
    <li><a href="/venues">GET /venues</a> – списък с всички места</li>
    <li><a href="/venues/new">GET /venues/new</a> – форма за ново място</li>
    <li><code>POST /venues</code> – създаване на ново място</li>
    <li><a href="/venues/1/edit">GET /venues/1/edit</a> – форма за редактиране</li>
    <li><code>POST /venues/1</code> – запис на промени</li>
    <li><code>POST /venues/1/delete</code> – изтриване</li>
  </ul>
</body>
</html>
