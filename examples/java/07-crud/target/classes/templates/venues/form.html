<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Форма</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/venues">CRUD Демо</a>
    </div>
</nav>
<div class="container" style="max-width:640px">
    <h1 class="mb-4" th:text="${title}">Форма</h1>

    <!--
      th:object="${venue}"  – обвързва формата с Venue bean
      th:field="*{name}"   – генерира id, name, value
      th:errors="*{name}"  – показва грешки от валидацията
    -->
    <form th:action="${action}" th:object="${venue}" method="POST">

        <!-- Наименование -->
        <div class="mb-3">
            <label for="name" class="form-label fw-semibold">
                Наименование <span class="text-danger">*</span>
            </label>
            <input type="text" th:field="*{name}" id="name"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                   class="form-control" maxlength="200" required>
            <div class="invalid-feedback" th:errors="*{name}"></div>
        </div>

        <!-- Град -->
        <div class="mb-3">
            <label for="city" class="form-label fw-semibold">
                Град <span class="text-danger">*</span>
            </label>
            <input type="text" th:field="*{city}" id="city"
                   th:classappend="${#fields.hasErrors('city')} ? 'is-invalid' : ''"
                   class="form-control" required>
            <div class="invalid-feedback" th:errors="*{city}"></div>
        </div>

        <!-- Категория -->
        <div class="mb-3">
            <label for="category" class="form-label fw-semibold">Категория</label>
            <select th:field="*{category}" id="category" class="form-select">
                <option value="restaurant">Ресторант</option>
                <option value="cafe">Кафе</option>
                <option value="bar">Бар</option>
                <option value="other">Друго</option>
            </select>
        </div>

        <!-- Описание -->
        <div class="mb-3">
            <label for="description" class="form-label fw-semibold">Описание</label>
            <textarea th:field="*{description}" id="description"
                      class="form-control" rows="3"></textarea>
        </div>

        <!-- Оценка -->
        <div class="mb-3">
            <label for="rating" class="form-label fw-semibold">Оценка (1–5)</label>
            <input type="number" th:field="*{rating}" id="rating"
                   th:classappend="${#fields.hasErrors('rating')} ? 'is-invalid' : ''"
                   class="form-control" min="1" max="5" style="max-width:100px">
            <div class="invalid-feedback" th:errors="*{rating}"></div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Запиши</button>
            <a href="/venues" class="btn btn-outline-secondary">Отказ</a>
        </div>
    </form>
</div>
</body>
</html>
