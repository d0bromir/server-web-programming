<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Заведения – CRUD</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/venues">CRUD Демо</a>
        <a href="/venues/new" class="btn btn-sm btn-outline-light">+ Добави</a>
    </div>
</nav>
<div class="container">
    <h1 class="mb-3">Заведения</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <table class="table table-hover bg-white shadow-sm rounded">
        <thead class="table-dark">
        <tr>
            <th>Наименование</th>
            <th>Град</th>
            <th>Категория</th>
            <th>Оценка</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="v : ${venues}">
            <td th:text="${v.name}">–</td>
            <td th:text="${v.city}">–</td>
            <td><span class="badge bg-secondary" th:text="${v.category}">–</span></td>
            <td th:text="${v.rating != null ? v.rating + '/5' : '–'}">–</td>
            <td>
                <a th:href="@{/venues/{id}/edit(id=${v.id})}"
                   class="btn btn-sm btn-outline-primary">Редакция</a>
                <form th:action="@{/venues/{id}/delete(id=${v.id})}"
                      method="POST" class="d-inline"
                      onsubmit="return confirm('Изтриване?')">
                    <button class="btn btn-sm btn-outline-danger">Изтрий</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(venues)}">
            <td colspan="5" class="text-center text-muted">Няма заведения.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
