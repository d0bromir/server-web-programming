<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Заведения – Тестване</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h3>Заведения (Тема 12 – Тестване)</h3>
    <p>Стартирайте тестовете: <code>mvn test</code></p>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr><th>#</th><th>Наименование</th><th>Град</th><th>Рейтинг</th><th></th></tr>
        </thead>
        <tbody>
            <tr th:each="v : ${venues}">
                <td th:text="${v.id}"></td>
                <td th:text="${v.name}"></td>
                <td th:text="${v.city}"></td>
                <td th:text="${v.rating}"></td>
                <td><a th:href="@{/venues/{id}(id=${v.id})}" class="btn btn-sm btn-outline-primary">Детайли</a></td>
            </tr>
            <tr th:if="${#lists.isEmpty(venues)}">
                <td colspan="5" class="text-center text-muted">Няма заведения.</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
