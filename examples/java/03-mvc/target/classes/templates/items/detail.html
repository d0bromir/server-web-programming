<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Детайли</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">MVC Demo</a>
    </div>
</nav>
<div class="container">
    <a href="/items" class="btn btn-sm btn-outline-secondary mb-3">← Назад</a>

    <div class="card shadow-sm" style="max-width:500px">
        <div class="card-body">
            <h2 class="card-title" th:text="${item.name()}">–</h2>
            <ul class="list-group list-group-flush">
                <li class="list-group-item">
                    <strong>Град:</strong> <span th:text="${item.city()}">–</span>
                </li>
                <li class="list-group-item">
                    <strong>Категория:</strong>
                    <span class="badge bg-secondary" th:text="${item.category()}">–</span>
                </li>
                <li class="list-group-item">
                    <strong>ID:</strong> <span th:text="${item.id()}">–</span>
                </li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
