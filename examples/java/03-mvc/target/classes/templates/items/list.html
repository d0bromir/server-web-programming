<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Заведения</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">MVC Demo</a>
    </div>
</nav>
<div class="container">
    <h1 class="mb-3" th:text="${title}">Заведения</h1>

    <!-- Филтър -->
    <form method="GET" action="/items" class="d-flex gap-2 mb-4">
        <select name="category" class="form-select w-auto">
            <option value="">Всички</option>
            <option value="restaurant">Ресторанти</option>
            <option value="cafe">Кафета</option>
            <option value="bar">Барове</option>
        </select>
        <button type="submit" class="btn btn-secondary">Филтрирай</button>
    </form>

    <!-- Списък -->
    <div class="row g-3">
        <div class="col-md-4" th:each="item : ${items}">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title" th:text="${item.name()}">–</h5>
                    <p class="card-text">
                        <span class="badge bg-secondary" th:text="${item.category()}">–</span>
                        <span class="ms-2 text-muted" th:text="${item.city()}">–</span>
                    </p>
                    <a th:href="@{/items/{id}(id=${item.id()})}" class="btn btn-sm btn-primary">
                        Детайли
                    </a>
                </div>
            </div>
        </div>
    </div>

    <p th:if="${#lists.isEmpty(items)}" class="alert alert-info mt-3">
        Няма резултати.
    </p>
</div>
</body>
</html>
