<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Добави заведение</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width:600px">
    <h1 class="mb-1">Добави заведение</h1>
    <p class="text-muted">Демонстрация на <code>POST</code> форма и PRG шаблон</p>

    <!-- Flash грешка (при redirect обратно към формата) -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!--
        method="post" → HTTP POST заявка
        PRG: след успешен POST контролерът прави redirect (302) → GET /
        Това предотвратява дублирано изпращане при F5 (презареждане).
    -->
    <form method="post" action="/add" class="card shadow-sm p-4">
        <div class="mb-3">
            <label for="name" class="form-label">Иmе <span class="text-danger">*</span></label>
            <input type="text" id="name" name="name" class="form-control"
                   placeholder="Ресторант Централ" required>
        </div>
        <div class="mb-3">
            <label for="city" class="form-label">Град</label>
            <input type="text" id="city" name="city" class="form-control"
                   placeholder="София">
        </div>
        <button type="submit" class="btn btn-success">Добави</button>
        <a href="/" class="btn btn-secondary ms-2">Отказ</a>
    </form>

    <div class="alert alert-info small mt-4">
        <strong>PRG (Post-Redirect-Get):</strong><br>
        <ol class="mb-0">
            <li>Браузърът изпраща <code>POST /add</code></li>
            <li>Сървърът обработва формата</li>
            <li>Сървърът връща <code>302 Found → Location: /</code></li>
            <li>Браузърът изпраща <code>GET /</code></li>
        </ol>
        При F5 браузърът повтаря само GET – без дублиран POST.
    </div>
</div>
</body>
</html>
