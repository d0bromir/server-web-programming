<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Търсене</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-1">Търсене на заведения</h1>
    <p class="text-muted">Демонстрация на <code>@RequestParam</code> – query string параметри</p>

    <!-- Форма с GET – параметрите се виждат в URL -->
    <form method="get" action="/search" class="row g-2 mb-4">
        <div class="col-sm-5">
            <input type="text" name="q" class="form-control"
                   placeholder="Търси по иmе..." th:value="${q}">
        </div>
        <div class="col-sm-4">
            <select name="city" class="form-select">
                <option value="" th:selected="${city == ''}">Всички градове</option>
                <option value="София"  th:selected="${city == 'София'}">София</option>
                <option value="Варна"  th:selected="${city == 'Варна'}">Варна</option>
                <option value="Бургас" th:selected="${city == 'Бургас'}">Бургас</option>
            </select>
        </div>
        <div class="col-sm-3">
            <button type="submit" class="btn btn-primary w-100">Търси</button>
        </div>
    </form>

    <!-- URL с параметри -->
    <div class="alert alert-secondary small">
        <strong>Текущ URL:</strong>
        <code>/search?q=<span th:text="${q}"></span>&amp;city=<span th:text="${city}"></span></code>
        <br>Spring чете параметрите чрез <code>@RequestParam</code>.
    </div>

    <!-- Резултати -->
    <div th:if="${#lists.isEmpty(results)}" class="alert alert-warning">
        Не са намерени заведения.
    </div>
    <div th:unless="${#lists.isEmpty(results)}">
        <h5 class="mb-3">Намерени: <span th:text="${#lists.size(results)}">0</span></h5>
        <div class="list-group">
            <div th:each="v : ${results}" class="list-group-item">
                <strong th:text="${v.name}">Заведение</strong>
                <span class="text-muted ms-2" th:text="${v.city}">Град</span>
            </div>
        </div>
    </div>

    <a href="/" class="btn btn-secondary mt-3">← Начало</a>
</div>
</body>
</html>
