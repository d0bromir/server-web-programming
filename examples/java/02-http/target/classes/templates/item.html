<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Заведение</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width:600px">
    <h1 class="mb-1">Заведение #<span th:text="${id}"></span></h1>
    <p class="text-muted">Демонстрация на <code>@PathVariable</code></p>

    <div class="card shadow-sm mb-4">
        <ul class="list-group list-group-flush">
            <li class="list-group-item">
                <strong>Иmе:</strong> <span th:text="${name}">–</span>
            </li>
            <li class="list-group-item">
                <strong>Град:</strong> <span th:text="${city}">–</span>
            </li>
        </ul>
    </div>

    <div class="alert alert-secondary small">
        <strong>URL:</strong> <code>/items/<span th:text="${id}"></span></code><br>
        Числото <code th:text="${id}"></code> се чете от пътя чрез
        <code>@PathVariable int id</code>.
    </div>

    <a href="/" class="btn btn-secondary">← Начало</a>
    <a href="/search" class="btn btn-outline-secondary ms-2">Търсене</a>
</div>
</body>
</html>
