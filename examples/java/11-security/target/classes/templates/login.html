<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Вход</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh">
    <div class="card shadow" style="width:360px">
        <div class="card-body p-4">
            <h5 class="mb-3">Вход</h5>
            <div th:if="${param.error}" class="alert alert-danger">Грешно потребителско име или парола.</div>
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Потребителско име</label>
                    <input type="text" name="username" class="form-control" value="user" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Парола</label>
                    <input type="password" name="password" class="form-control" value="password" required>
                </div>
                <button class="btn btn-danger w-100">Вход</button>
            </form>
            <p class="text-muted mt-2 small">Demo: user / password</p>
        </div>
    </div>
</div>
</body>
</html>
