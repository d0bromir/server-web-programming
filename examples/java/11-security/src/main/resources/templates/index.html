<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Тема 11 – Сигурност</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-danger px-3">
    <span class="navbar-brand">Тема 11 – Сигурност</span>
    <div>
        <span sec:authorize="isAuthenticated()" class="text-light me-3">
            <sec:authentication property="name"/>
        </span>
        <a sec:authorize="isAnonymous()" th:href="@{/login}" class="btn btn-outline-light btn-sm me-2">Вход</a>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="d-inline">
            <button class="btn btn-outline-light btn-sm">Изход</button>
        </form>
    </div>
</nav>

<div class="container mt-4">
    <h2>Демо за сигурност на уеб приложения</h2>
    <div class="list-group mt-3">
        <a th:href="@{/xss-demo}"     class="list-group-item list-group-item-action">1. XSS – th:text vs th:utext</a>
        <a th:href="@{/csrf-demo}"    class="list-group-item list-group-item-action">2. CSRF – защитена форма</a>
        <a th:href="@{/headers-demo}" class="list-group-item list-group-item-action">3. Security Headers (CSP, HSTS…)</a>
        <a th:href="@{/secure/protected}" class="list-group-item list-group-item-action">4. Защитена страница (изисква вход)</a>
    </div>
</div>
</body>
</html>
