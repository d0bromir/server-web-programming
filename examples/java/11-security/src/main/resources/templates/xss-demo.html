<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>XSS Демо</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h3>XSS – Cross-Site Scripting</h3>
    <p>Опитайте да въведете: <code>&lt;script&gt;alert('XSS')&lt;/script&gt;</code> или <code>&lt;b&gt;bold&lt;/b&gt;</code></p>

    <form th:action="@{/xss-demo}" th:object="${form}" method="post" class="mb-4">
        <div class="mb-3">
            <label class="form-label">Коментар</label>
            <input type="text" th:field="*{content}"
                   th:classappend="${#fields.hasErrors('content')} ? 'is-invalid'"
                   class="form-control">
            <div class="invalid-feedback" th:errors="*{content}"></div>
        </div>
        <button class="btn btn-primary">Изпрати</button>
    </form>

    <div th:if="${safeOutput}" class="mb-3">
        <h5 class="text-success">✅ th:text (БЕЗОПАСНО – екранира HTML)</h5>
        <div class="border p-3 bg-light" th:text="${safeOutput}"></div>
        <!-- Изходът е: &lt;script&gt;... – браузърът го показва като текст -->
    </div>

    <div th:if="${unsafeOutput}" class="mb-3">
        <h5 class="text-danger">⚠️ th:utext (НЕБЕЗОПАСНО – рендира суров HTML)</h5>
        <div class="border p-3 bg-light" th:utext="${unsafeOutput}"></div>
        <!-- Изходът е суров HTML – <b>bold</b> се рендира, <script> се изпълнява! -->
        <small class="text-muted">Никога не използвайте th:utext с потребителски данни!</small>
    </div>

    <a href="/" class="btn btn-secondary mt-3">Назад</a>
</div>
</body>
</html>
