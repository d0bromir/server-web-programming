<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Администрация</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-warning px-3">
    <span class="navbar-brand text-dark fw-bold">Admin панел</span>
    <div>
        <a th:href="@{/dashboard}" class="btn btn-dark btn-sm me-2">Табло</a>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button class="btn btn-outline-dark btn-sm">Изход</button>
        </form>
    </div>
</nav>

<div class="container mt-4">
    <h4>Всички потребители</h4>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Имe</th>
                <th>Имейл</th>
                <th>Роля</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.name}"></td>
                <td th:text="${u.email}"></td>
                <td>
                    <span th:text="${u.role}"
                          th:classappend="${u.role == 'ROLE_ADMIN'} ? 'badge bg-warning text-dark' : 'badge bg-secondary'">
                    </span>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
