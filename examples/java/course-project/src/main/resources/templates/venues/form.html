<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Заведение</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/}">🍽 Любими заведения</a>
    <a th:href="@{/venues}" class="btn btn-outline-light btn-sm">Назад</a>
</nav>

<div class="container mt-4" style="max-width:560px">
    <h4 th:text="${venueId != null} ? 'Редактиране на заведение' : 'Ново заведение'"></h4>

    <form th:action="${action}" th:object="${form}" method="post" novalidate>
        <div class="mb-3">
            <label class="form-label">Наименование *</label>
            <input type="text" th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                   class="form-control" required>
            <div class="invalid-feedback" th:errors="*{name}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Град *</label>
            <input type="text" th:field="*{city}"
                   th:classappend="${#fields.hasErrors('city')} ? 'is-invalid'"
                   class="form-control" required>
            <div class="invalid-feedback" th:errors="*{city}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Категория *</label>
            <select th:field="*{category}"
                    th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'"
                    class="form-select" required>
                <option value="">-- Изберете --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat}" th:text="${cat}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{category}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Описание</label>
            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Рейтинг (1–5) *</label>
            <input type="number" th:field="*{rating}" step="0.1" min="1" max="5"
                   th:classappend="${#fields.hasErrors('rating')} ? 'is-invalid'"
                   class="form-control" required>
            <div class="invalid-feedback" th:errors="*{rating}"></div>
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" th:field="*{public}" class="form-check-input" id="isPublic">
            <label class="form-check-label" for="isPublic">Публично</label>
        </div>
        <button class="btn btn-primary">Запази</button>
        <a th:href="@{/venues}" class="btn btn-secondary ms-2">Отказ</a>
    </form>
</div>
</body>
</html>
