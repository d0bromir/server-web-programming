<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"><title>Моите заведения</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/}">🍽 Любими заведения</a>
    <div class="ms-auto d-flex gap-2">
        <a th:href="@{/}" class="btn btn-outline-light btn-sm">Начало</a>
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-outline-light btn-sm">Изход</button>
        </form>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>Моите заведения</h4>
        <a th:href="@{/venues/new}" class="btn btn-primary">+ Добави</a>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>#</th><th>Наименование</th><th>Град</th>
                <th>Категория</th><th>Рейтинг</th><th>Публично</th><th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="v : ${venues}">
                <td th:text="${v.id}"></td>
                <td th:text="${v.name}"></td>
                <td th:text="${v.city}"></td>
                <td th:text="${v.category}"></td>
                <td th:text="${v.rating}"></td>
                <td th:text="${v.public ? 'Да' : 'Не'}"></td>
                <td>
                    <a th:href="@{/venues/{id}/edit(id=${v.id})}"
                       class="btn btn-sm btn-outline-secondary me-1">Редактирай</a>
                    <form th:action="@{/venues/{id}/delete(id=${v.id})}"
                          method="post" class="d-inline"
                          onsubmit="return confirm('Изтриване?')">
                        <button class="btn btn-sm btn-outline-danger">Изтрий</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(venues)}">
                <td colspan="7" class="text-center text-muted">Нямате заведения.</td>
            </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
