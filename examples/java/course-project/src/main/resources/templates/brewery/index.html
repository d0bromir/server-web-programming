<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Пивоварни</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/}">🍽 Любими заведения</a>
    <a th:href="@{/}" class="btn btn-outline-light btn-sm">Начало</a>
</nav>

<div class="container mt-4">
    <h4>Пивоварни (Open Brewery DB)</h4>
    <p class="text-muted">Данните се зареждат от <code>https://api.openbrewerydb.org</code></p>

    <form th:action="@{/brewery}" method="get" class="row g-2 mb-4">
        <div class="col-md-4">
            <input type="text" name="city" class="form-control"
                   placeholder="Търсене по град (на английски)…"
                   th:value="${city}">
        </div>
        <div class="col-auto">
            <button class="btn btn-primary">Търси</button>
        </div>
    </form>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row row-cols-1 row-cols-md-2 g-3">
        <div class="col" th:each="b : ${breweries}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${b['name']}"></h5>
                    <p class="card-text small text-muted"
                       th:text="${b['brewery_type']} + ' · ' + ${b['city']} + ', ' + ${b['country']}">
                    </p>
                    <a th:if="${b['website_url'] != null}"
                       th:href="${b['website_url']}"
                       target="_blank" rel="noopener noreferrer"
                       class="btn btn-sm btn-outline-primary">Уебсайт</a>
                </div>
            </div>
        </div>
        <div th:if="${breweries == null or #lists.isEmpty(breweries)}" class="col-12 text-muted">
            Няма резултати.
        </div>
    </div>
</div>
</body>
</html>
