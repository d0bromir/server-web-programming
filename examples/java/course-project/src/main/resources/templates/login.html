<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Вход</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh">
    <div class="card shadow" style="width:400px">
        <div class="card-body p-4">
            <h4 class="mb-3">Вход</h4>
            <div th:if="${param.error}" class="alert alert-danger">Грешен имейл или парола.</div>
            <div th:if="${success}"     class="alert alert-success" th:text="${success}"></div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Имейл</label>
                    <input type="email" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Парола</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button class="btn btn-primary w-100">Вход</button>
            </form>
            <div class="text-center mt-3">
                <a th:href="@{/register}">Нямате акаунт? Регистрирайте се</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
