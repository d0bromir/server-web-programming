<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Любими заведения</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">🍽 Любими заведения</a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <a th:href="@{/brewery}" class="btn btn-outline-light btn-sm">Пивоварни</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/venues}" class="btn btn-outline-light btn-sm">Моите</a>
            <a sec:authorize="isAnonymous()" th:href="@{/login}"    class="btn btn-outline-light btn-sm">Вход</a>
            <a sec:authorize="isAnonymous()" th:href="@{/register}" class="btn btn-light btn-sm">Регистрация</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light btn-sm">Изход</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- Flash съобщения -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Форма за търсене и филтриране -->
    <form th:action="@{/}" method="get" class="row g-2 mb-4">
        <div class="col-md-4">
            <input type="text" name="search" class="form-control"
                   placeholder="Търсене по наименование или град…"
                   th:value="${search}">
        </div>
        <div class="col-md-2">
            <select name="category" class="form-select">
                <option value="">Всички категории</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat}" th:text="${cat}"
                        th:selected="${cat == category}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <select name="sort" class="form-select">
                <option value="rating" th:selected="${sort == 'rating'}">По рейтинг</option>
                <option value="name"   th:selected="${sort == 'name'}">По наименование</option>
                <option value="city"   th:selected="${sort == 'city'}">По град</option>
            </select>
        </div>
        <div class="col-md-2">
            <select name="dir" class="form-select">
                <option value="desc" th:selected="${dir == 'desc'}">↓ Намаляващ</option>
                <option value="asc"  th:selected="${dir == 'asc'}">↑ Нарастващ</option>
            </select>
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100">Търси</button>
        </div>
    </form>

    <!-- Карти с заведения -->
    <div class="row row-cols-1 row-cols-md-3 g-4 mb-4">
        <div class="col" th:each="v : ${venues}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title d-flex justify-content-between">
                        <span th:text="${v.name}"></span>
                        <a th:if="${favorites.contains(v.id)}"
                           th:href="@{/favorite(venueId=${v.id},action='remove',search=${search},category=${category},sort=${sort},dir=${dir})}"
                           class="text-danger text-decoration-none" title="Премахни от любими">❤️</a>
                        <a th:unless="${favorites.contains(v.id)}"
                           th:href="@{/favorite(venueId=${v.id},action='add',search=${search},category=${category},sort=${sort},dir=${dir})}"
                           class="text-muted text-decoration-none" title="Добави в любими">🤍</a>
                    </h5>
                    <p class="card-text text-muted small" th:text="${v.city}"></p>
                    <span class="badge bg-secondary" th:text="${v.category}"></span>
                    <span class="ms-2">⭐ <span th:text="${v.rating}"></span></span>
                    <p class="mt-2 small" th:text="${v.description}"></p>
                </div>
            </div>
        </div>
        <div th:if="${venues.totalElements == 0}" class="col-12 text-center text-muted py-5">
            Няма намерени заведения.
        </div>
    </div>

    <!-- Пагинация -->
    <nav th:if="${venues.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${venues.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/(page=${venues.number - 1},search=${search},category=${category},sort=${sort},dir=${dir})}">
                    &laquo;
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, venues.totalPages - 1)}"
                th:classappend="${i == venues.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/(page=${i},search=${search},category=${category},sort=${sort},dir=${dir})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${venues.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/(page=${venues.number + 1},search=${search},category=${category},sort=${sort},dir=${dir})}">
                    &raquo;
                </a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
