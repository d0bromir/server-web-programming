<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Регистрация</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh">
    <div class="card shadow" style="width:420px">
        <div class="card-body p-4">
            <h4 class="mb-3">Регистрация</h4>
            <form th:action="@{/register}" th:object="${form}" method="post" novalidate>
                <div class="mb-3">
                    <label class="form-label">Имe</label>
                    <input type="text" th:field="*{name}"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                           class="form-control" required>
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Имейл</label>
                    <input type="email" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                           class="form-control" required>
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Парола (мин. 8 символа)</label>
                    <input type="password" th:field="*{password}"
                           th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                           class="form-control" required>
                    <div class="invalid-feedback" th:errors="*{password}"></div>
                </div>
                <button class="btn btn-success w-100">Регистрация</button>
            </form>
            <div class="text-center mt-3">
                <a th:href="@{/login}">Вече имате акаунт? Влезте</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
