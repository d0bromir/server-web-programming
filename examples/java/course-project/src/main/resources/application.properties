spring.application.name=venues-app
server.port=8080

# ──────────────────────────────────────────────────────────────────────
# PostgreSQL – уверете се, че сте създали базата:
#   createdb venues_db
# и потребителят postgres има парола postgres
# ──────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/venues_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Thymeleaf – изключва кеша в dev режим
spring.thymeleaf.cache=false
